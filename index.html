<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 İyi ki Doğdun ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff5f9e,#ffc3d8);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.card{
background:white;
padding:35px;
border-radius:25px;
width:90%;
max-width:550px;
box-shadow:0 0 30px rgba(0,0,0,.3);
z-index:5;
}

h1{
color:#ff0066;
font-size:40px;
}

p{
margin-top:15px;
font-size:20px;
color:#555;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff0066;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#mesaj{
margin-top:25px;
font-size:22px;
font-weight:bold;
color:#d6005b;
min-height:70px;
}

.heart{
position:absolute;
bottom:-50px;
color:red;
animation:fly linear infinite;
}

@keyframes fly{
0%{
transform:translateY(0);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}
</style>

</head>

<body>

<div class="card">

<h1>🎂 İyi ki Doğdun ❤️</h1>

<p>
Bugün senin günün...<br>
Umarım yeni yaşın sana mutluluk, sağlık ve huzur getirir. 🌹
</p>

<button onclick="goster()">
💌 Sürprizi Aç
</button>

<div id="mesaj"></div>

<audio autoplay loop controls>
<source src="Karnaval-Bir-Tek-Sen-56.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const mesajlar=[
"🎉 İyi ki doğdun...",
"❤️ Gülüşün hiç eksik olmasın.",
"🌹 Hayatın hep güzelliklerle dolsun.",
"✨ Tüm hayallerin gerçekleşsin.",
"💖 Sen mutlu olmayı hak ediyorsun.",
"🥰 Belki yollarımız ayrıldı...",
"🤍 Ama bugün sadece bunu söylemek istiyorum...",
"🎂 İYİ Kİ DOĞDUN ❤️"
];

let i=0;

function goster(){

document.getElementById("mesaj").innerHTML=mesajlar[i];

i++;

if(i>=mesajlar.length){
i=0;
}

}

for(let a=0;a<40;a++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.fontSize=(15+Math.random()*30)+"px";

h.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
